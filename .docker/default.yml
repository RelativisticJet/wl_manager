#
# Splunk Ansible-based configuration (used by the official Splunk Docker image).
# This file is picked up automatically when placed in the container or passed
# via SPLUNK_APPS_URL.  We use it to pre-configure the wl_audit index and
# create test users/roles.
#

splunk:
  conf:
    #
    # Create the wl_audit index on first boot
    #
    indexes:
      directory: /opt/splunk/etc/apps/wl_manager/default
      content:
        wl_audit:
          coldPath: "$SPLUNK_DB/wl_audit/colddb"
          homePath: "$SPLUNK_DB/wl_audit/db"
          thawedPath: "$SPLUNK_DB/wl_audit/thaweddb"
          maxTotalDataSizeMB: 512
