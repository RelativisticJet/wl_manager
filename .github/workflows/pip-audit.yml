name: pip-audit — dev dependency CVE scan

# Quarterly CVE scan of `requirements-dev.txt` against the OSV
# database + GitHub Advisory Database. Origin: round 7 B4
# (one-off run, 2026-04-29) found pytest 8.1.1 vulnerable to
# GHSA-6w46-j5rx-g56g. Round 8 (2026-04-29) wires this as a
# recurring CI job so we don't forget to re-run.
#
# Cadence: 1st of every quarter (Jan 1, Apr 1, Jul 1, Oct 1) at
# 09:00 UTC. Also runs on demand via workflow_dispatch.
#
# Failure mode: the workflow fails when pip-audit finds a vuln,
# producing a red CI badge + email to the repo owner via GitHub's
# existing notification settings. No PR is auto-created — the
# remediation requires human judgment (bump pin? wait for upstream
# fix? add a known-issue exception?).

on:
  schedule:
    # Quarterly: Jan 1, Apr 1, Jul 1, Oct 1 at 09:00 UTC.
    # Pinned to the 1st (not Sunday-of-week) so audits anchor on
    # absolute dates that are easy to reason about against the
    # CHANGELOG and version-pinning audit cadence.
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: Audit requirements-dev.txt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        # Pinned + hashed in requirements/pip-audit.txt.
        # No `pip install --upgrade pip` — pip self-upgrade can't be
        # hash-pinned; see ci.yml for the rationale.
        run: pip install --require-hashes -r requirements/pip-audit.txt

      - name: Run pip-audit
        # `--strict` exits non-zero on ANY finding (including those
        # without a known fix). Use `--ignore-vuln <ID>` here to
        # carve out a documented exception with a tracking note.
        #
        # Scope: requirements-dev.txt (root unit-test deps) +
        # requirements/*.txt (CI lockfiles added 2026-05-22). All four
        # hashed lockfiles are scanned in one run so any new CVE in
        # the CI dep tree (test/docs/pip-audit/appinspect stacks) is
        # caught with the same SLA as the root manifest.
        #
        # Active carve-outs (each must have a matching DECISION_LOG row):
        #
        # GHSA-vfmq-68hx-4jfw / CVE-2026-41066 — lxml XXE via
        # iterparse() and ETCompatXMLParser() with resolve_entities=True.
        # Patched in lxml 6.1.0; unreachable here because
        # splunk-appinspect 4.2.0 hard-pins lxml<6.0.0,>=5.3.0 (see
        # `pip show splunk-appinspect` Requires-Dist). lxml is invoked
        # ONLY by appinspect.yml against our own .spl artifact (trusted
        # input). Reachability of the vuln requires source-commit
        # access; at that level XXE-via-lxml is far down the threat
        # list. Re-eval when splunk-appinspect releases a version
        # allowing lxml>=6.1.0. See DECISION_LOG 2026-05-22 lxml row.
        run: |
          pip-audit --strict \
            --ignore-vuln GHSA-vfmq-68hx-4jfw \
            --requirement requirements-dev.txt \
            --requirement requirements/test.txt \
            --requirement requirements/docs.txt \
            --requirement requirements/pip-audit.txt \
            --requirement requirements/appinspect.txt

      - name: Reminder on failure
        if: failure()
        run: |
          echo "::error::pip-audit found at least one vulnerability."
          echo "::error::Document the finding in docs/PIP_AUDIT_LOG.md and either"
          echo "::error::bump the pin or add an --ignore-vuln <ID> exception with rationale."
