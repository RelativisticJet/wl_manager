name: Secret Scan (gitleaks)

# Continuous secret-scanning gate added 2026-05-16 per Phase 0.10
# follow-up. Phase 0.10 itself was a one-shot scan of all 456 commits
# in the history; this workflow catches future regressions before
# they reach the public branch.
#
# Triggers:
#   - push to main: catches anything that bypassed the PR scan
#   - pull_request: catches the typical introduction path
#   - weekly schedule: catches drift from new rule sets in gitleaks
#   - workflow_dispatch: manual re-run for ad-hoc verification
#
# Config: .gitleaks.toml at repo root encodes the Phase 0.10
# accepted false-positives (Chang3d!, audit.xml dashboard tokens).
# Adding new allowlist entries requires the same level of
# justification — see the comments in .gitleaks.toml.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Monday 06:00 UTC. Catches drift if gitleaks adds a new
    # detector that re-flags an existing string in the repo.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write  # so the action can comment on PRs

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for commit-walk scans)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for org-level scans on
          # private repos; wl_manager is public, so it's not needed.
          # The action auto-discovers .gitleaks.toml at repo root.
