name: Validate and Package Whitelist Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Workflow-level permissions (round 7, 2026-04-29). Default
# GITHUB_TOKEN scope on a forked repo is "read" but on this repo
# was unset — explicitly pin to read so the upload-artifact step
# cannot accidentally write to PRs/issues/contents.
permissions:
  contents: read

jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Bash is pre-installed on `ubuntu-latest` runners. The prior
    # "Set up Bash environment" step that ran `apt-get install bash`
    # without sudo failed at every push since the workflow was added
    # (commit 219355e, 2026-03-22) — 30+ red runs in a row — and the
    # downstream validate/package steps were never reached. Removed
    # in this commit to let the workflow actually do its job.

    - name: Run validation script
      run: |
        if [ -f ./scripts/validate.sh ]; then
          bash ./scripts/validate.sh
        else
          echo 'Validation script not found, skipping validation'
        fi

    - name: Run packaging script
      run: |
        if [ -f ./scripts/package.sh ]; then
          bash ./scripts/package.sh
        else
          echo 'Packaging script not found, skipping packaging'
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: wl_manager-package
        path: dist/*.spl
        retention-days: 30
