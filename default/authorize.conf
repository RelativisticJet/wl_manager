#
# Custom roles for the Whitelist Manager app.
#
# wl_superadmin      — system owner: controls admin limits, trash retention,
#                      purges deleted items, assigns roles
# wl_admin           — can approve/reject requests, configure editor limits,
#                      view analyst usage (Control Panel access)
# wl_analyst_editor  — can view AND edit whitelists (security analysts)
# wl_analyst_viewer  — can view whitelists and audit trail (read-only)
#
# Legacy roles (wl_editor, wl_viewer) are kept for backward compatibility
# and import the new roles automatically.
#
# Assign these roles to your users via Splunk's Settings > Access Controls > Roles.
#

[role_wl_superadmin]
importRoles          = wl_admin
srchIndexesAllowed   = wl_audit
srchIndexesDefault   = wl_audit

[role_wl_admin]
importRoles          = power
srchIndexesAllowed   = wl_audit
srchIndexesDefault   = wl_audit

[role_wl_analyst_editor]
importRoles          = power
srchIndexesAllowed   = wl_audit
srchIndexesDefault   = wl_audit

[role_wl_analyst_viewer]
importRoles          = user
srchIndexesAllowed   = wl_audit
srchIndexesDefault   = wl_audit

# Backward-compatible aliases — existing users with these roles keep access
[role_wl_editor]
importRoles          = wl_analyst_editor

[role_wl_viewer]
importRoles          = wl_analyst_viewer
