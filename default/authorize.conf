#
# Custom roles for the Whitelist Manager app.
#
# wl_editor  — can view AND edit whitelists (security analysts)
# wl_viewer  — can view whitelists and audit trail (read-only)
#
# Assign these roles to your users via Splunk's Settings > Access Controls > Roles.
#

[role_wl_editor]
importRoles          = user
srchIndexesAllowed   = wl_audit
srchIndexesDefault   = wl_audit

[role_wl_viewer]
importRoles          = user
srchIndexesAllowed   = wl_audit
srchIndexesDefault   = wl_audit
