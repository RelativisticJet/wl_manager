# Splunk KV store collections for Whitelist Manager
#
# wl_cooldowns stores rate-limit counters and cooldown timestamps that
# MUST survive `| delete` on indexes and filesystem tampering of the
# lookups directory. Records are HMAC-signed with a runtime-derived key
# (see bin/wl_handler.py :: _get_runtime_hmac_key) so an attacker who
# only has read access to source code cannot forge valid records.

[wl_cooldowns]
# field.<name> = <type>
field.payload = string
field.checksum = string
field.updated_at = number
field.updated_by = string
field.schema_version = number

# File Integrity Monitor baseline — the canonical baseline is ALSO
# stored here alongside the on-disk JSON copy (see bin/wl_fim.py).
# Cross-validation: if the filesystem copy diverges from the KV
# copy an alert fires. An attacker who deletes .fim_baseline.json
# to hide prior mutations is still caught because the KV row is
# intact and would still carry the original hashes.
[wl_fim_baseline]
field.payload = string
field.checksum = string
field.updated_at = number
field.updated_by = string

# Presence (UI-watch indicator) state — Ring 6.1 Day 6.1.9a R6-F8
# fix. Previously kept as a module-level dict in wl_presence.py,
# which gave each PersistentScriptHandler worker its own slice and
# made the "X is also viewing this CSV" indicator unreliable
# (analysts on different workers missed each other's presence).
# Migrating to KV serializes writes through Splunk's KV layer and
# guarantees every worker sees the same state. Key is csv_file;
# payload is JSON of {user: {last_activity, idle_minutes}}.
[wl_presence_state]
field._key = string
field.payload = string
field.updated_at = number

# Rate-limit sliding-window state — Ring 6.1 Day 6.1.9b R6-F8
# sibling fix. Previously kept as a module-level _rate_limits dict
# in wl_ratelimit.py, which let one user's writes routed across N
# workers bypass RATE_MAX_WRITES=30/60s independently per worker
# (effective cap ~30*N). Migrating to KV restores cross-worker
# enforcement. Key is "<user>::<action_type>"; payload is JSON
# array of recent request timestamps.
[wl_ratelimit_state]
field._key = string
field.payload = string
field.updated_at = number
