#
# Dedicated index for whitelist audit events.
# Every CSV save writes a JSON event here with before/after diff.
#

[wl_audit]
coldPath   = $SPLUNK_DB/wl_audit/colddb
homePath   = $SPLUNK_DB/wl_audit/db
thawedPath = $SPLUNK_DB/wl_audit/thaweddb

# Retain audit data for 3 years (adjust to your retention policy)
frozenTimePeriodInSecs = 94608000

# 1 GB cap — audit events are small, this is plenty
maxTotalDataSizeMB = 1024
