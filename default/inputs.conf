#
# Scheduled expiration cleanup — runs every hour.
# Iterates all CSVs from rule_csv_map.csv, removes expired rows,
# and writes audit events to wl_audit.
#

[script://$SPLUNK_HOME/etc/apps/wl_manager/bin/wl_expiration_cleanup.py]
disabled        = false
interval        = 3600
index           = _internal
sourcetype      = wl_expiration_cleanup
# AppInspect requires `python.version = python3` (current cert) AND
# `python.required = 3.13` (Splunk 10.2+ future cert). Keep both —
# they are not aliases: python.required wants a semver, python.version
# wants the `python3` literal. Removing either breaks one check.
python.version  = python3
python.required = 3.13

#
# Tails the append-only recovery log written by emergency_unlock.sh
# and reset_cooldowns.sh so out-of-band recovery actions are visible
# in the Audit dashboard and cannot be quietly dropped. Props for
# parsing live in default/props.conf [wl_audit_recovery].
#
[monitor://$SPLUNK_HOME/etc/apps/wl_manager/lookups/_versions/_recovery_log.jsonl]
disabled       = false
index          = wl_audit
sourcetype     = wl_audit_recovery

#
# File Integrity Monitor — full cryptographic scan of critical source
# and sentinel files. Emits JSON events when an unexpected change is
# detected. Runs every 15 seconds as the "slow path" that catches
# mtime-preserving attacks. Paired with wl_fim_watch.py (2s stat-based
# fast path) for near-real-time detection of most modifications.
# Props for parsing live in default/props.conf [wl_fim].
#
[script://$SPLUNK_HOME/etc/apps/wl_manager/bin/wl_fim.py]
disabled        = false
interval        = 15
index           = wl_audit
sourcetype      = wl_fim
python.version  = python3
python.required = 3.13
# passAuth makes splunkd send a session token on the script's stdin
# so wl_fim.py can reach the wl_fim_baseline KV store collection
# for dual-source baseline cross-validation.
passAuth        = splunk-system-user

#
# Near-real-time stat-based file change detector. Persistent process
# (interval=0) that polls os.stat() every 2 seconds and emits alerts
# when file mtime or size changes. Complements wl_fim.py (15s crypto
# scan) to give ~2s detection for most modifications.
#
[script://$SPLUNK_HOME/etc/apps/wl_manager/bin/wl_fim_watch.py]
disabled        = false
interval        = 0
index           = wl_audit
sourcetype      = wl_fim
python.version  = python3
python.required = 3.13
