[wl_audit]
TRUNCATE = 0

# Recovery log produced by emergency_unlock.sh / reset_cooldowns.sh.
# Each line is a single JSON record — one record = one event.
#
# NOTE: With INDEXED_EXTRACTIONS=json, fields are extracted at INDEX
# time. We must explicitly set KV_MODE=none, otherwise Splunk's default
# (auto) re-runs JSON extraction at SEARCH time and Splunk treats the
# result as a multi-valued field — dashboards then render duplicate
# values stacked in the same cell ("HIGH\nHIGH", same timestamp twice,
# etc.). KV_MODE=none disables search-time KV extraction; the indexed
# fields remain searchable as normal.
[wl_audit_recovery]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TRUNCATE            = 0
LINE_BREAKER        = ([\r\n]+)
SHOULD_LINEMERGE    = false
TIME_PREFIX         = "timestamp":\s*
TIME_FORMAT         = %s
MAX_TIMESTAMP_LOOKAHEAD = 20

# File Integrity Monitor events (bin/wl_fim.py scripted input).
# Same INDEXED_EXTRACTIONS-only rule as above — see comment for wl_audit_recovery.
[wl_fim]
INDEXED_EXTRACTIONS = json
KV_MODE             = none
TRUNCATE            = 0
LINE_BREAKER        = ([\r\n]+)
SHOULD_LINEMERGE    = false
TIME_PREFIX         = "timestamp":\s*
TIME_FORMAT         = %s
MAX_TIMESTAMP_LOOKAHEAD = 20
