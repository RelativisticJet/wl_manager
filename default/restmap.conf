#
# Register the Python REST handler for the Whitelist Manager API.
#
# Endpoint: /custom/wl_manager
# Methods:  GET  — list rules, list CSVs, read CSV content
#           POST — save CSV with diff + audit
#

[script:wl_manager_handler]
match                 = /custom/wl_manager
script                = wl_handler.py
scripttype            = persist
handler               = wl_handler.WhitelistHandler
requireAuthentication = true
output_modes          = json
passPayload           = true
passHttpHeaders       = true
passHttpCookies       = true
passSystemAuth        = true
# AppInspect requires `python.version = python3` (current cert) AND
# `python.required = 3.13` (Splunk 10.2+ future cert). Keep both.
python.version        = python3
python.required       = 3.13
