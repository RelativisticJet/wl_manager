#
# Saved searches for Whitelist Manager dashboards
#

[wl_expiring_soon]
description       = Show whitelist rows approaching expiration across all CSVs
search            = | inputlookup rule_csv_map.csv \
    | map maxsearches=100 search="| inputlookup $csv_file$ | eval csv_file=\"$csv_file$\", detection_rule=\"$rule_name$\"" \
    | eval _expire_val=coalesce(Expires, expire, expiration, expiration_date, expiry, termination, termination_date, "") \
    | where _expire_val!="" \
    | eval exp_time=coalesce(strptime(_expire_val, "%Y-%m-%d %H:%M"), strptime(_expire_val, "%Y-%m-%d")) \
    | where isnotnull(exp_time) AND exp_time > now() \
    | eval _secs_left=exp_time - now(), _total_hours=floor(_secs_left / 3600), _days_whole=floor(_total_hours / 24), _hours_rem=_total_hours % 24 \
    | eval _d_word=if(_days_whole==1, "day", "days"), _h_word=if(_hours_rem==1, "hour", "hours") \
    | eval _time_label=case(_days_whole==0, _hours_rem." "._h_word." left", _hours_rem==0, _days_whole." "._d_word." left", 1==1, _days_whole." "._d_word." "._hours_rem." "._h_word." left") \
    | eval Expires=_expire_val." ("._time_label.")" \
    | fields - _* exp_time _expire_val _added_by _added_at _review_status \
    | sort 0 _total_hours \
    | table detection_rule csv_file Expires _total_hours * \
    | fields - _total_hours
disabled          = false
is_visible        = false

#
# FIM Watcher Heartbeat Monitor — alerts when the persistent stat-based
# watcher stops emitting heartbeats (killed, crashed, or wedged).
# The watcher emits a heartbeat every 5 minutes. This search runs every
# 6 minutes and alerts if no heartbeat was received in the last 7 minutes.
#
[wl_fim_watcher_heartbeat_monitor]
description       = Alert when FIM stat-watcher heartbeat is missing (process may be killed or crashed)
search            = index=wl_audit sourcetype=wl_fim source_script=wl_fim_watch action=fim_watch_heartbeat earliest=-7m \
    | stats count \
    | where count == 0 \
    | eval message="FIM stat-watcher heartbeat missing for 7+ minutes — the watcher process may have been killed. CSV integrity monitoring is degraded until the watcher restarts."
disabled          = false
is_visible        = false
cron_schedule     = */6 * * * *
enableSched       = 1
dispatch.earliest_time = -7m
dispatch.latest_time = now
counttype         = number of events
relation          = greater than
quantity          = 0
alert.severity    = 4
alert.suppress    = 1
alert.suppress.period = 30m

#
# CSV Integrity — Bootstrap Laundering Correlation
# Alerts when a bootstrap_csv_hash_changed event for a CSV appears
# within 5 minutes of a fim_csv_external_modification for the SAME CSV.
# This pattern indicates an attacker modified a CSV then immediately
# bootstrapped to suppress the watcher alert (laundering).
#
[wl_csv_bootstrap_laundering_correlation]
description       = Detect bootstrap laundering: CSV tampered then immediately re-bootstrapped to hide evidence
search            = index=wl_audit (action=fim_csv_external_modification OR action=bootstrap_csv_hash_changed) earliest=-10m \
    | eval tamper_time=if(action=="fim_csv_external_modification", _time, null()), bootstrap_time=if(action=="bootstrap_csv_hash_changed", _time, null()) \
    | stats min(tamper_time) as tamper_time max(bootstrap_time) as bootstrap_time by csv_file \
    | where isnotnull(tamper_time) AND isnotnull(bootstrap_time) \
    | eval gap_seconds=round(bootstrap_time - tamper_time, 0) \
    | where gap_seconds >= 0 AND gap_seconds <= 300 \
    | eval message="SUSPICIOUS: CSV ".csv_file." was externally modified then re-bootstrapped ".gap_seconds."s later — possible laundering attack to suppress integrity alerts"
disabled          = false
is_visible        = false
cron_schedule     = */5 * * * *
enableSched       = 1
dispatch.earliest_time = -10m
dispatch.latest_time = now
counttype         = number of events
relation          = greater than
quantity          = 0
alert.severity    = 5
alert.suppress    = 1
alert.suppress.period = 30m

#
# External CSV modification alert — CRITICAL
# Fires on any fim_csv_external_modification for a CSV that is CURRENTLY
# in our rule_csv_map.csv (i.e. a whitelist we manage). Joins against
# the live mapping at search time so foreign-app CSVs that happen to
# share a filename don't trigger the alert.
# Cron */1min, 2min earliest window, 10min suppression keeps the signal
# from becoming a flood if an attacker rewrites the same CSV repeatedly.
#
[wl_csv_external_modification_alert]
description       = Alert on any unauthorized CSV modification (SPL outputlookup, REST, direct FS write) for CSVs in our rule_csv_map
search            = index=wl_audit sourcetype=wl_fim action=fim_csv_external_modification earliest=-2m \
    | rename csv_file as mod_csv \
    | join type=inner mod_csv [ | inputlookup rule_csv_map.csv | rename csv_file as mod_csv | fields mod_csv ] \
    | rename mod_csv as csv_file \
    | eval message="CRITICAL: CSV ".csv_file." was modified outside the Whitelist Manager handler. This bypassed approval gates, daily limits, and audit trail. Review immediately."
disabled          = false
is_visible        = false
cron_schedule     = */1 * * * *
enableSched       = 1
dispatch.earliest_time = -2m
dispatch.latest_time = now
counttype         = number of events
relation          = greater than
quantity          = 0
alert.severity    = 5
alert.suppress    = 1
alert.suppress.period = 10m

#
# Deploy window opened during emergency lockdown — CRITICAL
# A legitimate deploy window is opened by a superadmin to suppress code-file
# FIM alerts during a release. During lockdown, ALL handler writes are
# blocked — so opening a deploy window at that moment is a strong
# indicator that a compromised superadmin is trying to push code under
# the noise. The handler already indexes open_deploy_window at HIGH;
# this alert correlates with the active lockdown state to escalate.
#
[wl_deploy_window_opened_during_lockdown]
description       = Alert when a deploy window is opened while emergency lockdown is active (likely malicious)
search            = index=wl_audit (action=open_deploy_window OR action=activate_lockdown OR action=deactivate_lockdown) earliest=-10m \
    | sort _time \
    | streamstats current=t latest(_time) as last_lock_event by 1=1 \
    | eval is_lock_on=if(action=="activate_lockdown", 1, if(action=="deactivate_lockdown", 0, null())) \
    | streamstats current=t last(is_lock_on) as lockdown_state \
    | where action=="open_deploy_window" AND lockdown_state==1 \
    | eval message="CRITICAL: deploy window opened at ".strftime(_time, "%Y-%m-%d %H:%M:%S")." while emergency lockdown is active. Deploy window is lockdown-exempt by design so hotfixes can be shipped, but opening one now is a hallmark of compromised-superadmin attack. Verify via separate channel with ".coalesce(analyst, "unknown")"."
disabled          = false
is_visible        = false
cron_schedule     = */1 * * * *
enableSched       = 1
dispatch.earliest_time = -10m
dispatch.latest_time = now
counttype         = number of events
relation          = greater than
quantity          = 0
alert.severity    = 5
alert.suppress    = 1
alert.suppress.period = 30m
