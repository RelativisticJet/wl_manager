<?xml version="1.0" encoding="UTF-8"?>
<!--
  CONCEPT 1 — Document on Shield with Check Badge

  Closest interpretation of the reference image. A document silhouette
  sits inside the aqua shield, showing 3 grey list rows. A circular
  check badge is anchored to the document's bottom-right corner,
  fully contained within the shield boundary.

  Reads as: "secure container > whitelist document > approved"

  Palette: aqua #1FB8C9 + black #1A1A1A + greys #D6DCE0 / #8A95A0
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256" height="256"
     role="img"
     aria-label="Whitelist Manager — document on shield with check badge">

  <!-- Shield silhouette (aqua) -->
  <path d="M 40 40
           L 216 40
           L 216 144
           Q 216 200 128 232
           Q 40 200 40 144
           Z"
        fill="#1FB8C9"/>

  <!-- Document body (light grey with black outline) -->
  <rect x="72" y="64" width="112" height="124"
        rx="6" ry="6"
        fill="#D6DCE0"
        stroke="#1A1A1A"
        stroke-width="4"/>

  <!-- Document title bar (a slightly darker band at the top of the page) -->
  <rect x="80" y="76" width="60" height="8"
        rx="4" ry="4"
        fill="#4A5560"/>

  <!-- Three list rows: bullet + line -->
  <!-- Row 1 -->
  <circle cx="86" cy="108" r="4" fill="#8A95A0"/>
  <rect x="98" y="105" width="72" height="6" rx="3" fill="#8A95A0"/>
  <!-- Row 2 -->
  <circle cx="86" cy="130" r="4" fill="#8A95A0"/>
  <rect x="98" y="127" width="64" height="6" rx="3" fill="#8A95A0"/>
  <!-- Row 3 -->
  <circle cx="86" cy="152" r="4" fill="#8A95A0"/>
  <rect x="98" y="149" width="56" height="6" rx="3" fill="#8A95A0"/>

  <!-- Check badge: black circle in document's bottom-right corner -->
  <circle cx="170" cy="178" r="18" fill="#1A1A1A"/>
  <path d="M 160 178
           L 168 186
           L 180 172"
        fill="none"
        stroke="#1FB8C9"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
