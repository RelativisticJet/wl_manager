<?xml version="1.0" encoding="UTF-8"?>
<!--
  CONCEPT 2 — Checklist Rows Inside Shield

  No "document" container — just the act of checking off list items.
  Four list rows inside the aqua shield, each preceded by a small
  black check mark. Most abstract of the four; reads as "secure +
  approved list" without literal paper imagery.

  Reads as: "shield > 4 ticked items"

  Palette: aqua #1FB8C9 + black #1A1A1A + grey #8A95A0
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256" height="256"
     role="img"
     aria-label="Whitelist Manager — shield with checklist rows">

  <!-- Shield silhouette (aqua) -->
  <path d="M 40 40
           L 216 40
           L 216 144
           Q 216 200 128 232
           Q 40 200 40 144
           Z"
        fill="#1FB8C9"/>

  <!-- Checklist row template:
       - small black check (10px wide)
       - grey horizontal line (40px wide)
       Four rows, stacked vertically with even spacing.
       All geometry kept well inside the shield's interior. -->

  <!-- Row 1 (y=76) -->
  <path d="M 72 80 L 78 86 L 88 74"
        fill="none" stroke="#1A1A1A" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="100" y="76" width="88" height="8" rx="4" fill="#1A1A1A"/>

  <!-- Row 2 (y=106) -->
  <path d="M 72 110 L 78 116 L 88 104"
        fill="none" stroke="#1A1A1A" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="100" y="106" width="80" height="8" rx="4" fill="#1A1A1A"/>

  <!-- Row 3 (y=136) -->
  <path d="M 72 140 L 78 146 L 88 134"
        fill="none" stroke="#1A1A1A" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="100" y="136" width="72" height="8" rx="4" fill="#1A1A1A"/>

  <!-- Row 4 (y=166) — empty check (not yet whitelisted) for variety -->
  <rect x="72" y="161" width="14" height="14" rx="3"
        fill="none" stroke="#1A1A1A" stroke-width="3"/>
  <rect x="100" y="166" width="60" height="8" rx="4" fill="#8A95A0"/>
</svg>
