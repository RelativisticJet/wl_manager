<?xml version="1.0" encoding="UTF-8"?>
<!--
  CONCEPT 3 — Bold Check Over Compact List

  Refines my original layout under the new aqua/black/grey palette.
  Big bold black checkmark dominates the upper portion of the shield;
  3 short grey list rows tuck below it as a subtle "list" hint.

  Most legible at 36px because the central symbol is one bold stroke.

  Reads as: "shield + APPROVED + list"

  Palette: aqua #1FB8C9 + black #1A1A1A + grey #4A5560 (deeper for contrast)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256" height="256"
     role="img"
     aria-label="Whitelist Manager — shield with bold check and list rows">

  <!-- Shield silhouette (aqua) -->
  <path d="M 40 40
           L 216 40
           L 216 144
           Q 216 200 128 232
           Q 40 200 40 144
           Z"
        fill="#1FB8C9"/>

  <!-- Bold black checkmark (upper portion, dominant element) -->
  <path d="M 72 130
           L 116 174
           L 188 90"
        fill="none"
        stroke="#1A1A1A"
        stroke-width="26"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Two list rows (lower portion, supporting metaphor — kept to two
       so the bold check stays dominant at 36×36 launcher size) -->
  <rect x="80" y="190" width="96" height="6" rx="3" fill="#4A5560"/>
  <rect x="80" y="204" width="72" height="6" rx="3" fill="#4A5560"/>
</svg>
