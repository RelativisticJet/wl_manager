<?xml version="1.0" encoding="UTF-8"?>
<!--
  CONCEPT 4 — Clipboard Inside Shield

  Strongest "whitelist document" identity of the four. The shield
  contains a literal clipboard silhouette: rectangular body + small
  rectangular clip at the top. Three grey list rows on the paper,
  and a small check badge in the clip area (anchored to the clip,
  not floating in the corner).

  Distinguishing detail vs concept-1: the clip is rendered as a
  visible shape, not just a flat rectangle. Reads more
  "office tool" / "real document".

  Palette: aqua #1FB8C9 + black #1A1A1A + greys #D6DCE0 / #8A95A0
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256" height="256"
     role="img"
     aria-label="Whitelist Manager — clipboard with check inside shield">

  <!-- Shield silhouette (aqua) -->
  <path d="M 40 40
           L 216 40
           L 216 144
           Q 216 200 128 232
           Q 40 200 40 144
           Z"
        fill="#1FB8C9"/>

  <!-- Clipboard body (paper) -->
  <rect x="72" y="76" width="112" height="120"
        rx="4" ry="4"
        fill="#D6DCE0"
        stroke="#1A1A1A"
        stroke-width="4"/>

  <!-- Clip at top of clipboard (the distinguishing element) -->
  <rect x="108" y="60" width="40" height="22"
        rx="4" ry="4"
        fill="#1A1A1A"/>
  <!-- Inner cut-out of the clip for depth -->
  <rect x="116" y="68" width="24" height="8"
        rx="2" ry="2"
        fill="#1FB8C9"/>

  <!-- Three list rows on the paper -->
  <!-- Row 1 -->
  <rect x="82" y="100" width="14" height="6" rx="3" fill="#1A1A1A"/>
  <rect x="104" y="100" width="68" height="6" rx="3" fill="#8A95A0"/>
  <!-- Row 2 -->
  <rect x="82" y="124" width="14" height="6" rx="3" fill="#1A1A1A"/>
  <rect x="104" y="124" width="60" height="6" rx="3" fill="#8A95A0"/>
  <!-- Row 3 -->
  <rect x="82" y="148" width="14" height="6" rx="3" fill="#1A1A1A"/>
  <rect x="104" y="148" width="52" height="6" rx="3" fill="#8A95A0"/>

  <!-- Approved stamp: black check inside grey circle, bottom-right of clipboard -->
  <circle cx="158" cy="178" r="16" fill="#1A1A1A"/>
  <path d="M 150 178
           L 156 184
           L 166 170"
        fill="none"
        stroke="#1FB8C9"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
