[pytest]
minversion = 8.0
testpaths = tests/unit tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (can run offline)
    integration: Integration tests (require Docker container)
    docker: Docker smoke tests (run only when container available)
    slow: Slow tests (concurrency, E2E, stress tests, integration, security)
    crud: Core CRUD workflow tests (add/edit/remove/revert rows and CSVs)
    approval: Approval workflow tests (approve and reject operations)
    revert: Version revert tests
    admin: Admin panel tests
    stress: Stress tests (wide CSV with many columns, large row count)
    security: Security/attack/injection tests

addopts =
    --verbose
    --strict-markers
    -ra

norecursedirs = .git .venv htmlcov __pycache__ *.egg-info
