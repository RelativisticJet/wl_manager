[pytest]
minversion = 8.0
testpaths = tests/unit tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Unit tests (can run offline)
    integration: Integration tests (require Docker container)
    docker: Docker smoke tests (run only when container available)

addopts =
    --verbose
    -ra

norecursedirs = .git .venv htmlcov __pycache__ *.egg-info
