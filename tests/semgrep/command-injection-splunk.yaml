# Splunk-adapted command-injection rule.
# Derived from RAPTOR's engine/semgrep/rules/injection/command-taint.yaml.
#
# Changes from the RAPTOR original:
#   - pattern-sources: replaced Flask/Django shapes with Splunk BaseRestHandler
#     patterns (request.get, payload.get, payload[$_]).
#   - pattern-sinks: narrowed to the subprocess family with shell=True. The
#     legacy os.{system,popen} sinks are covered by RAPTOR's original rule,
#     which we run side-by-side.
rules:
  - id: splunk.injection.command.taint.python
    message: >-
      Splunk handler payload data reaches a shell-executing call. Replace with
      list-based subprocess.run(args, ...) or shlex.quote the components.
    languages: [python]
    severity: ERROR
    mode: taint
    pattern-sources:
      - pattern-either:
          - pattern: request.get($_)
          - pattern: payload.get($_)
          - pattern: payload[$_]
          - pattern: flask.request.args[$_]
          - pattern: flask.request.form[$_]
          - pattern: input(...)
    pattern-sinks:
      - pattern-either:
          - pattern: subprocess.run($CMD, ..., shell=True, ...)
          - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
          - pattern: subprocess.call($CMD, ..., shell=True, ...)
          - pattern: subprocess.check_call($CMD, ..., shell=True, ...)
          - pattern: subprocess.check_output($CMD, ..., shell=True, ...)
    pattern-sanitizers:
      - pattern: shlex.quote(...)
      - pattern: shlex.join(...)
    metadata:
      cwe: ["CWE-78"]
      adapted_from: "gadievron/raptor injection/command-taint.yaml"
